<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen Timeline</title>
    <script>
    (function () {
        var params = new URLSearchParams(location.search);
        var override = params.get('v');
        var stored = null;
        try { stored = sessionStorage.getItem('zenline:variant'); } catch (e) {}

        var variant = (override === 'desktop' || override === 'mobile') ? override : stored;
        if (!variant) {
            var ua = navigator.userAgent || '';
            var uaMobile = /Mobi|Android|iPhone|iPad|iPod|IEMobile|Opera Mini/i.test(ua);
            var coarse = window.matchMedia && window.matchMedia('(pointer: coarse)').matches;
            var narrow = window.innerWidth < 900;
            variant = (uaMobile || coarse || narrow) ? 'mobile' : 'desktop';
        }

        if (override) {
            try { sessionStorage.setItem('zenline:variant', variant); } catch (e) {}
        }

        var target = variant + '/' + location.hash;
        location.replace(target);
    })();
    </script>
</head>
<body></body>
</html>
